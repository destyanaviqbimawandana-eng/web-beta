<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LembagaKita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-card {
            border-radius: 20px;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-5">
            <div class="card login-card shadow-lg border-0">
                <div class="login-header text-white text-center py-4">
                    <i class="bi bi-building fs-1"></i>
                    <h3 class="mb-0 mt-2">LembagaKita</h3>
                    <p class="mb-0 opacity-75">Silakan login untuk melanjutkan</p>
                </div>
                <div class="card-body p-4">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="loginUsername" placeholder="admin" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="loginEmail" placeholder="admin@lembaga.id" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="loginPassword" placeholder="••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">
                            <i class="bi bi-box-arrow-in-right"></i> Masuk
                        </button>
                        <div id="loginError" class="alert alert-danger mt-3 d-none">
                            Login gagal! Gunakan: admin / admin@lembaga.id / 123456
                        </div>
                    </form>
                    <div class="mt-4 text-center small text-secondary">
                        <i class="bi bi-info-circle"></i> Demo: <strong>admin</strong> | admin@lembaga.id | 123456
                        <br>
                        <span class="badge bg-info mt-2">✨ Setelah login akan muncul badge "Admin" dan tombol "Logout"</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function() {
        // Cek apakah sudah login, jika sudah redirect ke index
        if (localStorage.getItem("isLoggedIn") === "true") {
            window.location.href = "index.html";
            return;
        }
        
        $("#loginForm").on("submit", function(e) {
            e.preventDefault();
            
            const username = $("#loginUsername").val().trim();
            const email = $("#loginEmail").val().trim();
            const password = $("#loginPassword").val().trim();
            
            // Debug: lihat input di console
            console.log("Username:", username);
            console.log("Email:", email);
            console.log("Password:", password);
            
            // Validasi login
            if (username === "admin" && email === "admin@lembaga.id" && password === "123456") {
                // Simpan data ke localStorage
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("isAdmin", "true");
                localStorage.setItem("currentUser", JSON.stringify({ 
                    username: username, 
                    email: email, 
                    role: "admin",
                    displayName: "Admin"
                }));
                
                console.log("Login berhasil! Redirecting...");
                
                // Redirect ke halaman index
                window.location.href = "index.html";
            } else {
                // Tampilkan error
                $("#loginError").removeClass("d-none");
                console.log("Login gagal!");
            }
        });
    });
</script>
</body>
</html>
